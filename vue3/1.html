<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3</title>
    <script src="https://unpkg.com/vue@next"></script>
    <style>
        .msg {
            color: pink;
        }
    </style>
</head>

<body>
    <!-- 带id的div标签？
    组件化思想  VS  DOM思想
    -->
    <div id="app">  
            <!--  插入一个挂载点
            根节点 挂载组件
            内部使用组件化思想
            内部使用数据驱动
            内部支持 v-for v-if 指令
            DOM  原始 不支持的？  vue来支持 -->
    </div>
    <script>
        // App 开发思想
        // Vue 框架
        // Vue 原生js  对象
        // 命名空间  所有功能汇集到一个点
        // let Vue = (function() {
        //     let Vue ={}
        //     return Vue
        // })()

        // Vue就像三明治 template {{ msg }} <my-component/> wx:for

        // 单例模式创建一个实例  根实例
        // 1. 创建一个web App?   Vue.createApp({})
        // 2. 挂载到#app 根节点上
        // 第一个根组件的开发，方便我们组件化思想的落地
        Vue.createApp({
            // 模板？ html?  DOM
            // 组件 = 标签+css+js
            // 模板 相当于 wxml
            template: '<div class="msg">Hello World! {{counter}} </div>',
            // js? 数据
            data() {
                return {
                    // 数据驱动的思想
                    counter : 1   // 返回一个对象
                }
            },
            // // 加载完成时自动触发  生命周期函数
            // onLoad() {
            // }
            // vue组件下载和执行也要花时间
            // template + js data  一起执行 生成dom string  需要花时间
            // dom string 挂载到 #app上也要花时间

            mounted() {  // 组件已经完全挂载，可以在页面上看到这个组件
                console.log('页面加载完成后-自动执行');
                // this
                setInterval(() => {
                    // this.setData()  // 小程序抄的react
                    // this.counter += 1  // 数据驱动 vue this data 数据
                    this.$data.counter += 1
                },1000)
            }
        }).mount('#app')  // 挂载点上
    </script>
</body>

</html>
